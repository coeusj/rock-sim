syntax = "proto3";

package rocket;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/coeusj/rock-sim/gen/rocket";

message Telemetry {
    string status = 1;
    double altitude = 2;
    double velocity = 3;
    double latitude = 4;
    double longitude = 5;
    double pitchDeg = 6;
    double yawDeg = 7;
    double rollDeg = 8;
    double chamberPressurePsi = 9;
    double batteryPerc = 10;
    google.protobuf.Timestamp timestamp = 11;
}